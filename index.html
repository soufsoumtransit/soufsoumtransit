<!-- Écran d'erreur de secours : visible si React ne démarre jamais (erreur de script avant montage) -->
<div id="boot-error">
  <div style="max-width:480px;margin:60px auto 0;text-align:center;">
    <div style="font-size:32px;margin-bottom:12px;">⚠️</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:10px;">L'application n'a pas pu démarrer</div>
    <div id="boot-error-detail" style="font-size:13px;color:#8B93A7;line-height:1.6;text-align:left;background:#0B1526;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px;white-space:pre-wrap;word-break:break-word;"></div>
  </div>
</div>

<div id="root"></div>

<script>
  // Filet de sécurité global : toute erreur JS non interceptée (CDN qui ne charge pas,
  // script cassé, etc.) affiche un écran lisible au lieu d'un écran blanc silencieux.
  window.addEventListener("error", function (e) {
    var root = document.getElementById("root");
    var boot = document.getElementById("boot-error");
    var detail = document.getElementById("boot-error-detail");
    if (root && root.childElementCount === 0) {
      boot.style.display = "block";
      detail.textContent = (e.message || "Erreur inconnue") + "\n" + (e.filename ? ("Fichier : " + e.filename + ":" + e.lineno) : "");
    }
  });
</script>

  if (typeof ReactDOM === "undefined") missing.push("ReactDOM");
  if (typeof window.supabase === "undefined") missing.push("Supabase JS");

    const boot = document.getElementById("boot-error");
    const detail = document.getElementById("boot-error-detail");
    boot.style.display = "block";

/* ---------- Utilitaires ---------- */
function hoursSince(dateStr) {
  if (!dateStr) return null;
  return (Date.now() - new Date(dateStr).getTime()) / 36e5;
}

function urgencyOf(d) {
  const avdReq = d.statut_avd === "En requête";
  const licReq = (d.statuts_licences || []).some((l) => l.statut === "En requête");
  const exoReq = d.exo_licence160 === "En suspens" || d.exo_attestation === "En suspens";
  let red = false, yellow = false;
  if (avdReq || licReq) {
    yellow = true;
    const h = hoursSince(d.statut_avd_changed_at);
    if (h !== null && h > 48) red = true;
  }
  if (exoReq) {
    yellow = true;
  }
  if (red) return "red";
  if (yellow) return "yellow";
  return null;
}

// Calcule la dernière étape / sous-étape réellement cochée (non vide) pour un dossier,
// en parcourant le workflow dans l'ordre et en gardant la dernière valeur non nulle.
// Ignore volontairement les étapes antérieures dès qu'une étape plus avancée est cochée.
function niveauAffiche(d) {
  let niveau = "Nouveau";
  let sousEtape = d.nouveau_dossier_statut || null;

  if (d.parcours === "AVD" && d.statut_avd) {
    niveau = "AVD";
    sousEtape = d.statut_avd;
  }
  if (d.parcours === "Exoneration" && (d.exo_licence160 || d.exo_attestation)) {
    niveau = "Exoneration";
    // priorité à l'attestation si les deux sont cochées (étape la plus avancée du sous-workflow)
    sousEtape = d.exo_attestation || d.exo_licence160;
  }
  if (d.declaration_statut2) {
    niveau = "Declaration";
    sousEtape = d.declaration_statut2;
  }

  return { niveau, sousEtape };
}

function fmtFCFA(n) {
  return new Intl.NumberFormat("fr-FR").format(Math.round(n || 0)) + " F";
}

function timeAgo(dateStr) {
  const h = hoursSince(dateStr);
  if (h === null) return "";
  if (h < 1) return Math.round(h * 60) + " min";
  if (h < 48) return Math.round(h) + " h";
  return Math.round(h / 24) + " j";
}

async function getNextRepertoire() {
  const { data, error } = await supabase.rpc("next_repertoire");
  if (error) throw error;
  const row = Array.isArray(data) ? data[0] : data;
  return { repertoire: row.repertoire, sequence_number: row.seq };
}

async function setStartSequenceRemote(n, prefixe, suffixe, largeur) {
  const { error } = await supabase.rpc("set_start_sequence_format", { p_start: n, p_prefixe: prefixe, p_suffixe: suffixe, p_largeur: largeur });
  if (error) throw error;
}

async function forceStartSequenceRemote(n, prefixe, suffixe, largeur) {
  const { error } = await supabase.rpc("force_start_sequence_format", { p_start: n, p_prefixe: prefixe, p_suffixe: suffixe, p_largeur: largeur });
  if (error) throw error;
}

async function repertoireExists(repertoire) {
  const { data, error } = await supabase.rpc("repertoire_exists", { p_repertoire: repertoire });
  if (error) throw error;
  return !!data;
}

async function fetchStartSequence() {
  const { data, error } = await supabase.from("app_config").select("value").eq("key", "start_sequence").maybeSingle();
  if (error) throw error;
  return data ? data.value : null;
}

async function fetchRepertoireFormat() {
  const { data, error } = await supabase.from("app_config").select("value").eq("key", "repertoire_format").maybeSingle();
  if (error) throw error;
  return data ? data.value : null;
}

/* ---------- Configuration point de départ ---------- */
function StartSequenceSetup({ onConfirm }) {
  const [prefixe, setPrefixe] = useState("OK26");
  const [suffixe, setSuffixe] = useState("SS");
  const [value, setValue] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  const n = parseInt(value, 10);
  const largeur = value.trim().length; // ex: "001" -> 3 chiffres, "01" -> 2 chiffres
  const valid = value.trim() !== "" && /^\d+$/.test(value.trim()) && n > 0;
  const apercu = valid ? prefixe + String(n).padStart(largeur, "0") + suffixe : "";

  const handleConfirm = async () => {
    if (!valid) return;
    setSaving(true);
    setError(null);
    try {
      await setStartSequenceRemote(n, prefixe, suffixe, largeur);
      const actual = await fetchStartSequence();
      const fmt = await fetchRepertoireFormat();
      onConfirm({
        start: actual !== null ? actual : n,
        prefixe: fmt ? fmt.prefixe : prefixe,
        suffixe: fmt ? fmt.suffixe : suffixe,
        largeur: fmt ? fmt.largeur : largeur,
      });
    } catch (e) {
      setError("Impossible d'enregistrer le point de départ : " + (e.message || "erreur inconnue"));
    } finally {
      setSaving(false);
    }
  };

  return (
    <div style={{ maxWidth: 480, margin: "60px auto 0" }}>
      <div style={{ textAlign: "center", marginBottom: 26 }}>
        <div style={{ fontSize: 11, color: GOLD, textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 700, marginBottom: 8 }}>Première configuration</div>
        <h1 style={{ fontSize: 22, fontWeight: 700, color: PAPER, margin: 0 }}>Format du répertoire</h1>
        <p style={{ fontSize: 13.5, color: MUTED, marginTop: 10, lineHeight: 1.5 }}>
          Définissez le préfixe, le suffixe et le nombre de départ. Le nombre de chiffres tapé (ex : 001 pour 3 chiffres, 01 pour 2 chiffres) sera conservé pour toute la numérotation qui suit.
        </p>
      </div>
      <div style={{ background: INK_2, border: "1px solid rgba(255,255,255,0.08)", borderRadius: 16, padding: 24 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <Field label="Préfixe">
            <input style={inputStyle} placeholder="Ex : OK26" value={prefixe} onChange={(e) => setPrefixe(e.target.value)} />
          </Field>
          <Field label="Suffixe">
            <input style={inputStyle} placeholder="Ex : SS" value={suffixe} onChange={(e) => setSuffixe(e.target.value)} />
          </Field>
        </div>
        <Field label="Nombre de départ">
          <input style={inputStyle} placeholder="Ex : 001" value={value} onChange={(e) => setValue(e.target.value.replace(/[^0-9]/g, ""))} />
        </Field>
        {valid && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 14px", background: "rgba(196,149,42,0.08)", border: "1px solid rgba(196,149,42,0.25)", borderRadius: 10, marginBottom: 4 }}>
            <span style={{ fontSize: 13, color: GOLD, fontWeight: 600 }}>Premier dossier</span>
            <span style={{ fontSize: 16, fontWeight: 700, color: GOLD, fontFamily: "ui-monospace, monospace" }}>{apercu}</span>
          </div>
        )}
        {error && <div style={{ fontSize: 12.5, color: "#FF8A8D", marginTop: 8 }}>{error}</div>}
        <button onClick={handleConfirm} disabled={!valid || saving} style={{
          width: "100%", marginTop: 18, padding: "13px", borderRadius: 11, border: "none", background: GOLD, color: INK,
          fontSize: 14.5, fontWeight: 700, cursor: valid && !saving ? "pointer" : "not-allowed", opacity: valid && !saving ? 1 : 0.5,
          display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
        }}>
          {saving && <IconLoader size={16} color={INK} style={{ animation: "spin 1s linear infinite" }} />}
          {saving ? "Enregistrement…" : "Valider ce format"}
        </button>
      </div>
    </div>
  );
}

/* ---------- Formulaire nouveau dossier ---------- */
function NewDossierForm({ onCancel, onCreate }) {
  const [parcours, setParcours] = useState(null);
  const [nouveauStatut, setNouveauStatut] = useState(null);
  const [dateDossier, setDateDossier] = useState(new Date().toISOString().slice(0, 10));
  const [modeRepertoire, setModeRepertoire] = useState("auto"); // "auto" | "manuel"
  const [repertoireAuto, setRepertoireAuto] = useState(null);
  const [seqAuto, setSeqAuto] = useState(null);
  const [repertoireManuel, setRepertoireManuel] = useState("");
  const [checkingRepertoire, setCheckingRepertoire] = useState(false);
  const [repertoireDejaPris, setRepertoireDejaPris] = useState(false);
  const [loadingNumero, setLoadingNumero] = useState(true);
  const [clientNom, setClientNom] = useState("");
  const [descriptionNote, setDescriptionNote] = useState("");
  const [numeroBl, setNumeroBl] = useState("");
  const [typeOp, setTypeOp] = useState(null);
  const [typeMarchandise, setTypeMarchandise] = useState("");
  const [nb20, setNb20] = useState("");
  const [nb40, setNb40] = useState("");
  const [paiementSimple, setPaiementSimple] = useState(true);
  const [paye, setPaye] = useState(null);
  const [montantTotal, setMontantTotal] = useState("");
  const [montantPaye, setMontantPaye] = useState("");
  const [payeChez, setPayeChez] = useState(null);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    getNextRepertoire().then(({ repertoire, sequence_number }) => {
      if (cancelled) return;
      setRepertoireAuto(repertoire);
      setSeqAuto(sequence_number);
      setLoadingNumero(false);
    }).catch(() => { if (!cancelled) setLoadingNumero(false); });
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (modeRepertoire !== "manuel" || !repertoireManuel.trim()) {
      setRepertoireDejaPris(false);
      return;
    }
    let cancelled = false;
    setCheckingRepertoire(true);
    const t = setTimeout(() => {
      repertoireExists(repertoireManuel.trim()).then((exists) => {
        if (cancelled) return;
        setRepertoireDejaPris(exists);
        setCheckingRepertoire(false);
      }).catch(() => { if (!cancelled) setCheckingRepertoire(false); });
    }, 400);
    return () => { cancelled = true; clearTimeout(t); };
  }, [repertoireManuel, modeRepertoire]);

  const reste = Math.max(0, (parseFloat(montantTotal) || 0) - (parseFloat(montantPaye) || 0));
  const clientValid = clientNom.trim() !== "";
  const repertoireFinal = modeRepertoire === "auto" ? repertoireAuto : repertoireManuel.trim();
  const repertoireValid = modeRepertoire === "auto" ? !!repertoireAuto : (repertoireManuel.trim() !== "" && !repertoireDejaPris && !checkingRepertoire);
  const canSubmit = clientValid && repertoireValid && !loadingNumero;

  const handleSubmit = async () => {
    if (!clientValid) { setError("Le nom du client est obligatoire."); return; }
    if (!repertoireValid) { setError("Le répertoire n'est pas valide ou existe déjà."); return; }
    setSaving(true);
    setError(null);
    try {
      let repertoire = repertoireFinal;
      let sequence_number = seqAuto;
      if (modeRepertoire === "auto") {
        const fresh = await getNextRepertoire();
        repertoire = fresh.repertoire;
        sequence_number = fresh.sequence_number;
      } else {
        const exists = await repertoireExists(repertoire);
        if (exists) { setError("Ce répertoire existe déjà. Choisissez-en un autre."); setSaving(false); return; }
        const match = repertoire.match(/^\D*(\d+)\D*$/);
        sequence_number = match ? parseInt(match[1], 10) : 0;
      }

      const payload = {
        repertoire, sequence_number,
        date_dossier: dateDossier,
        parcours,
        nouveau_dossier_statut: nouveauStatut,
        client_nom: clientNom.trim(),
        description_note: descriptionNote || null,
        numero_bl: numeroBl || null,
        type_op: typeOp,
        type_marchandise: typeMarchandise || null,
        marchandise: typeMarchandise || null,
        nb_conteneurs_20: parseInt(nb20, 10) || 0,
        nb_conteneurs_40: parseInt(nb40, 10) || 0,
        statut_avd: null,
        statut_avd_changed_at: null,
        statuts_licences: [],
        exo_licence160: null,
        exo_attestation: null,
        declaration_statut2: null,
        declaration_tiree_at: null,
        numero_declaration: null,
        paiement_simple: paiementSimple,
        paye: paiementSimple ? !!paye : false,
        montant_total: parseFloat(montantTotal) || 0,
        montant_paye: parseFloat(montantPaye) || 0,
        paye_chez: payeChez,
      };
      const { data, error: insertError } = await supabase.from("dossiers").insert(payload).select().single();
      if (insertError) throw insertError;
      onCreate(data);
    } catch (e) {
      setError("Impossible de créer le dossier : " + (e.message || "erreur inconnue"));
      setSaving(false);
    }
  };

  return (
    <div style={{ maxWidth: 640, margin: "0 auto", paddingBottom: 90 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 22 }}>
        <button onClick={onCancel} style={{ background: "none", border: "none", cursor: "pointer", padding: 6, borderRadius: 8, display: "flex" }}>
          <IconArrowLeft size={20} color={MUTED} />
        </button>
        <div>
          <div style={{ fontSize: 11, color: MUTED, textTransform: "uppercase", letterSpacing: "0.06em" }}>Nouveau dossier</div>
          <div style={{ fontSize: 20, fontWeight: 700, color: PAPER }}>Le numéro sera attribué à la création</div>
        </div>
      </div>

      <div style={{ background: INK_2, border: "1px solid rgba(255,255,255,0.08)", borderRadius: 16, padding: 24 }}>
        <Field label="Répertoire">
          <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
            <div style={selectChipStyle(modeRepertoire === "auto")} onClick={() => setModeRepertoire("auto")}>Automatique</div>
            <div style={selectChipStyle(modeRepertoire === "manuel")} onClick={() => setModeRepertoire("manuel")}>Taper un répertoire existant</div>
          </div>
          {modeRepertoire === "auto" ? (
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 14px", background: "rgba(196,149,42,0.08)", border: "1px solid rgba(196,149,42,0.25)", borderRadius: 10 }}>
              <span style={{ fontSize: 13, color: GOLD, fontWeight: 600 }}>Prochain numéro</span>
              <span style={{ fontSize: 15, fontWeight: 700, color: GOLD, fontFamily: "ui-monospace, monospace" }}>
                {loadingNumero ? <IconLoader size={14} color={GOLD} style={{ animation: "spin 1s linear infinite" }} /> : repertoireAuto}
              </span>
            </div>
          ) : (
            <div>
              <input
                style={{ ...inputStyle, borderColor: repertoireManuel.trim() && repertoireDejaPris ? RED : "rgba(255,255,255,0.12)" }}
                placeholder="Ex : OK26150SS"
                value={repertoireManuel}
                onChange={(e) => setRepertoireManuel(e.target.value.toUpperCase())}
              />
              {checkingRepertoire && (
                <div style={{ fontSize: 12, color: MUTED, marginTop: 6, display: "flex", alignItems: "center", gap: 6 }}>
                  <IconLoader size={12} color={MUTED} style={{ animation: "spin 1s linear infinite" }} /> Vérification…
                </div>
              )}
              {!checkingRepertoire && repertoireManuel.trim() && repertoireDejaPris && (
                <div style={{ fontSize: 12, color: "#FF8A8D", marginTop: 6 }}>Ce répertoire existe déjà. Impossible de continuer avec ce numéro.</div>
              )}
              {!checkingRepertoire && repertoireManuel.trim() && !repertoireDejaPris && (
                <div style={{ fontSize: 12, color: GREEN, marginTop: 6 }}>Répertoire disponible.</div>
              )}
              <div style={{ fontSize: 11.5, color: MUTED, marginTop: 8 }}>
                Le prochain numéro automatique restera <span style={{ color: GOLD, fontFamily: "ui-monospace, monospace" }}>{repertoireAuto}</span> quel que soit le répertoire tapé ici.
              </div>
            </div>
          )}
        </Field>

        <Field label="Date du dossier">
          <input style={inputStyle} type="date" value={dateDossier} onChange={(e) => setDateDossier(e.target.value)} />
        </Field>

        <div style={{ height: 1, background: "rgba(196,149,42,0.3)", margin: "20px 0" }} />

        <div style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {TYPES_OP.map((t) => <div key={t} style={selectChipStyle(typeOp === t)} onClick={() => setTypeOp(typeOp === t ? null : t)}>{t}</div>)}
          </div>
        </div>

        <div style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {PARCOURS.map((p) => <div key={p.key} style={selectChipStyle(parcours === p.key)} onClick={() => setParcours(parcours === p.key ? null : p.key)}>{p.label}</div>)}
          </div>
        </div>

        <Field label="État du dossier">
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {NOUVEAU_DOSSIER_STATUTS.map((s) => <div key={s} style={selectChipStyle(nouveauStatut === s)} onClick={() => setNouveauStatut(nouveauStatut === s ? null : s)}>{s}</div>)}
          </div>
        </Field>

        <div style={{ height: 1, background: "rgba(196,149,42,0.3)", margin: "20px 0" }} />

        <Field label="Nom du client (obligatoire)">
          <input style={inputStyle} placeholder="Ex : Société ABC Sarl" value={clientNom} onChange={(e) => setClientNom(e.target.value)} />
        </Field>

        <Field label="Description / Note (facultatif)">
          <input style={inputStyle} placeholder="Ex : Client prioritaire, appel avant retrait" value={descriptionNote} onChange={(e) => setDescriptionNote(e.target.value)} />
        </Field>

        <Field label="Numéro de BL">
          <input style={inputStyle} placeholder="Ex : MSCU1234567" value={numeroBl} onChange={(e) => setNumeroBl(e.target.value)} />
        </Field>

        <Field label="Type de marchandise">
          <input style={inputStyle} placeholder="Ex : Pièces détachées auto" value={typeMarchandise} onChange={(e) => setTypeMarchandise(e.target.value)} />
        </Field>

        <Field label="Équipement">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <div>
              <label style={{ display: "block", fontSize: 11, color: MUTED, marginBottom: 6 }}>Conteneurs 20'</label>
              <input style={inputStyle} type="number" min="0" placeholder="0" value={nb20} onChange={(e) => setNb20(e.target.value)} />
            </div>
            <div>
              <label style={{ display: "block", fontSize: 11, color: MUTED, marginBottom: 6 }}>Conteneurs 40'</label>
              <input style={inputStyle} type="number" min="0" placeholder="0" value={nb40} onChange={(e) => setNb40(e.target.value)} />
            </div>
          </div>
        </Field>

        <div style={{ height: 1, background: "rgba(196,149,42,0.3)", margin: "20px 0" }} />

        <div style={{ marginBottom: 16 }}>
          <Toggle on={!paiementSimple} onChange={(v) => setPaiementSimple(!v)} label="Mode détails (montants)" />
        </div>

        {paiementSimple ? (
          <Field label="Paiement">
            <div style={{ display: "flex", gap: 8 }}>
              <div onClick={() => setPaye(paye === true ? null : true)} style={{
                flex: 1, textAlign: "center", padding: "12px", borderRadius: 10, cursor: "pointer", fontWeight: 700, fontSize: 13.5,
                border: "1px solid " + (paye === true ? GREEN : "rgba(255,255,255,0.12)"),
                background: paye === true ? "rgba(63,201,138,0.15)" : "rgba(255,255,255,0.03)",
                color: paye === true ? GREEN : MUTED,
              }}><IconCheck size={14} color={paye === true ? GREEN : MUTED} style={{ marginRight: 6, display: "inline-block", verticalAlign: -2 }} />Payé</div>
              <div onClick={() => setPaye(paye === false ? null : false)} style={{
                flex: 1, textAlign: "center", padding: "12px", borderRadius: 10, cursor: "pointer", fontWeight: 700, fontSize: 13.5,
                border: "1px solid " + (paye === false ? RED : "rgba(255,255,255,0.12)"),
                background: paye === false ? "rgba(229,72,77,0.15)" : "rgba(255,255,255,0.03)",
                color: paye === false ? "#FF8A8D" : MUTED,
              }}><IconX size={14} color={paye === false ? "#FF8A8D" : MUTED} style={{ marginRight: 6, display: "inline-block", verticalAlign: -2 }} />Non payé</div>
            </div>
          </Field>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <Field label="Montant attendu (FCFA)">
              <input style={inputStyle} type="number" placeholder="0" value={montantTotal} onChange={(e) => setMontantTotal(e.target.value)} />
            </Field>
            <Field label="Montant payé (FCFA)">
              <input style={inputStyle} type="number" placeholder="0" value={montantPaye} onChange={(e) => setMontantPaye(e.target.value)} />
            </Field>
          </div>
        )}

        <Field label="Payé chez">
          <div style={{ display: "flex", gap: 8 }}>
            {PAYE_CHEZ_DEFAUT.map((p) => <div key={p} style={selectChipStyle(payeChez === p)} onClick={() => setPayeChez(payeChez === p ? null : p)}>{p}</div>)}
          </div>
        </Field>

        {!paiementSimple && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 14px", background: "rgba(229,72,77,0.08)", border: "1px solid rgba(229,72,77,0.25)", borderRadius: 10 }}>
            <span style={{ fontSize: 13, color: "#FF8A8D", fontWeight: 600 }}>Reste dû (calcul automatique)</span>
            <span style={{ fontSize: 16, fontWeight: 700, color: "#FF8A8D" }}>{fmtFCFA(reste)}</span>
          </div>
        )}

        {error && <div style={{ fontSize: 12.5, color: "#FF8A8D", marginTop: 10 }}>{error}</div>}
      </div>

      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, padding: "14px 16px", background: INK, borderTop: "1px solid rgba(255,255,255,0.08)", zIndex: 20 }}>
        <div style={{ maxWidth: 640, margin: "0 auto" }}>
          <button onClick={handleSubmit} disabled={saving || !canSubmit} style={{
            width: "100%", padding: "13px", borderRadius: 11, border: "none", background: GOLD, color: INK,
            fontSize: 14.5, fontWeight: 700, cursor: (saving || !canSubmit) ? "not-allowed" : "pointer", display: "flex",
            alignItems: "center", justifyContent: "center", gap: 8, opacity: (saving || !canSubmit) ? 0.5 : 1,
          }}>
            {saving ? <IconLoader size={16} color={INK} style={{ animation: "spin 1s linear infinite" }} /> : <IconFileCheck size={16} color={INK} />}
            {saving ? "Création…" : "Créer le dossier"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---------- Détail dossier ---------- */
function DossierDetail({ dossier, onBack, onUpdate }) {
  const [draft, setDraft] = useState(dossier);
  const [saving, setSaving] = useState(false);
  const [tab, setTab] = useState("client");
  const urgency = urgencyOf(draft);

  useEffect(() => { setDraft(dossier); }, [dossier]);

  const dirty = JSON.stringify(draft) !== JSON.stringify(dossier);

  const set = (patch) => setDraft((prev) => ({ ...prev, ...patch }));

  const setAvd = (statut) => {
    set({ statut_avd: statut, statut_avd_changed_at: statut ? new Date().toISOString() : null });
  };

  const toggleLicence = (type) => {
    const exists = (draft.statuts_licences || []).find((l) => l.type === type);
    const statuts_licences = exists
      ? draft.statuts_licences.filter((l) => l.type !== type)
      : [...(draft.statuts_licences || []), { type, statut: "À payer" }];
    set({ statuts_licences });
  };

  const setLicenceStatut = (type, statut) => {
    const statuts_licences = statut === null
      ? (draft.statuts_licences || []).filter((l) => l.type !== type)
      : (draft.statuts_licences || []).map((l) => (l.type === type ? { ...l, statut } : l));
    set({ statuts_licences });
  };

  const setExo = (field, statut) => set({ [field]: statut });

  const setDeclaration2 = (statut) => {
    const now = new Date().toISOString();
    const patch = { declaration_statut2: statut };
    patch.declaration_tiree_at = statut ? (draft.declaration_tiree_at || now) : null;
    if (statut === "USN émis") patch.usn_emis_at = now;
    if (statut === "USN payé") patch.usn_paye_at = now;
    set(patch);
  };

  const handleValider = async () => {
    setSaving(true);
    const { data, error } = await supabase.from("dossiers").update(draft).eq("id", draft.id).select().single();
    setSaving(false);
    if (error) return;
    setDraft(data);
    onUpdate(data);
  };

  const handleAnnuler = () => setDraft(dossier);

  const reste = (draft.montant_total || 0) - (draft.montant_paye || 0);
  const equipLabel = [draft.nb_conteneurs_20 ? draft.nb_conteneurs_20 + "x20'" : null, draft.nb_conteneurs_40 ? draft.nb_conteneurs_40 + "x40'" : null].filter(Boolean).join(" · ");
  const etat = niveauAffiche(draft);
  const paiementOk = draft.paiement_simple === false ? reste <= 0 : draft.paye;

  const TABS = [
    { key: "client", label: "Client" },
    { key: "parcours", label: "Parcours" },
    { key: "paiement", label: "Paiement" },
  ];

  return (
    <div style={{ maxWidth: 760, margin: "0 auto", paddingBottom: dirty ? 90 : 20 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", padding: 6, borderRadius: 8, display: "flex" }}>
            <IconArrowLeft size={20} color={MUTED} />
          </button>
          <div>
            <div style={{ fontSize: 20, fontWeight: 700, color: PAPER, fontFamily: "ui-monospace, monospace" }}>{draft.repertoire}</div>
            <div style={{ fontSize: 12.5, color: MUTED }}>{draft.type_op}{equipLabel ? " · " + equipLabel : ""}{draft.numero_bl ? " · BL " + draft.numero_bl : ""}</div>
            <div style={{ fontSize: 12, color: GOLD, fontWeight: 600, marginTop: 3 }}>{NIVEAU_LABEL[etat.niveau]}{etat.sousEtape ? " · " + etat.sousEtape : ""}</div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          {urgency === "red" && <Badge tone="red"><IconAlertTriangle size={12} color="#FF8A8D" />Retard 48h+</Badge>}
          {urgency === "yellow" && <Badge tone="amber"><IconClock size={12} color={AMBER} />En requête</Badge>}

      <div style={{ display: "flex", gap: 4, marginBottom: 20, background: INK_2, borderRadius: 12, padding: 4, border: "1px solid rgba(255,255,255,0.08)" }}>

          <button key={t.key} onClick={() => setTab(t.key)} style={{
            flex: 1, padding: "10px", borderRadius: 9, border: "none", cursor: "pointer",

            fontSize: 13.5, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
          }}>
            {t.key === "paiement" && (paiementOk ? <IconCheck size={13} color={tab === t.key ? INK : GREEN} /> : <IconX size={13} color={tab === t.key ? INK : "#FF8A8D"} />)}

        <ModuleCard Icon={IconUser} title="Client">

          </Field>
          <Field label="Description / Note">
            <input style={inputStyle} value={draft.description_note || ""} onChange={(e) => set({ description_note: e.target.value })} />
          </Field>
          <Field label="Numéro de BL">
            <input style={inputStyle} value={draft.numero_bl || ""} onChange={(e) => set({ numero_bl: e.target.value })} />
          </Field>
          <Field label="Date du dossier">
            <input style={inputStyle} type="date" value={draft.date_dossier || ""} onChange={(e) => set({ date_dossier: e.target.value })} />

        </ModuleCard>
      )}

      {tab === "parcours" && (
        <React.Fragment>
          <div style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {TYPES_OP.map((t) => <div key={t} style={selectChipStyle(draft.type_op === t)} onClick={() => set({ type_op: draft.type_op === t ? null : t })}>{t}</div>)}
            </div>
          </div>

          <div style={{ height: 1, background: "rgba(196,149,42,0.3)", margin: "16px 0" }} />

          <div style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {PARCOURS.map((p) => <div key={p.key} style={selectChipStyle(draft.parcours === p.key)} onClick={() => set({ parcours: draft.parcours === p.key ? null : p.key })}>{p.label}</div>)}
            </div>
          </div>

          <ModuleCard Icon={IconFileCheck} title="Nouveau dossier">
            <StatusPicker options={NOUVEAU_DOSSIER_STATUTS} value={draft.nouveau_dossier_statut} onChange={(s) => set({ nouveau_dossier_statut: s })} danger="En attente de documents" />
          </ModuleCard>

          {draft.parcours === "AVD" && (
            <ModuleCard Icon={IconShieldCheck} title="AVD">
              <StatusPicker options={AVD_STATUTS} value={draft.statut_avd} onChange={setAvd} />
              {draft.statut_avd === "En requête" && (
                <div style={{ marginTop: 10, fontSize: 12, color: AMBER }}>En requête depuis {timeAgo(draft.statut_avd_changed_at)}</div>
              )}
            </ModuleCard>
          )}

          {draft.parcours === "AVD" && (
            <ModuleCard Icon={IconFileCheck} title="Licences">
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
                {LICENCE_TYPES.map((t) => {
                  const active = (draft.statuts_licences || []).some((l) => l.type === t);
                  return (
                    <div key={t} onClick={() => toggleLicence(t)} style={{
                      padding: "7px 13px", borderRadius: 8, fontSize: 12.5, fontWeight: 700, cursor: "pointer",
                      border: "1px solid " + (active ? GOLD : "rgba(255,255,255,0.1)"),
                      background: active ? "rgba(196,149,42,0.16)" : "rgba(255,255,255,0.02)",
                      color: active ? GOLD : MUTED,
                    }}>Licence {t}</div>
                  );
                })}
              </div>
              {(draft.statuts_licences || []).map((l) => (
                <div key={l.type} style={{ marginBottom: 12, paddingLeft: 12, borderLeft: "2px solid rgba(196,149,42,0.3)" }}>
                  <div style={{ fontSize: 12, color: GOLD, fontWeight: 700, marginBottom: 6 }}>Licence {l.type}</div>
                  <StatusPicker options={LICENCE_STATUTS} value={l.statut} onChange={(s) => setLicenceStatut(l.type, s)} danger="En suspens" />
                </div>
              ))}
              {(draft.statuts_licences || []).length === 0 && <div style={{ fontSize: 12.5, color: MUTED }}>Aucune licence sélectionnée.</div>}
            </ModuleCard>
          )}

          {draft.parcours === "Exoneration" && (
            <ModuleCard Icon={IconShieldCheck} title="Exonération">
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, color: MUTED, fontWeight: 600, marginBottom: 6 }}>Licence 160</div>
                <StatusPicker options={EXO_STATUTS} value={draft.exo_licence160} onChange={(s) => setExo("exo_licence160", s)} danger="En suspens" />
              </div>
              <div>
                <div style={{ fontSize: 12, color: MUTED, fontWeight: 600, marginBottom: 6 }}>Attestation d'exonération</div>
                <StatusPicker options={EXO_STATUTS} value={draft.exo_attestation} onChange={(s) => setExo("exo_attestation", s)} danger="En suspens" />
              </div>
            </ModuleCard>
          )}

          <ModuleCard Icon={IconReceipt} title="Déclaration">
            <StatusPicker options={DECL_STATUTS2} value={draft.declaration_statut2} onChange={setDeclaration2} danger="" />
            {draft.declaration_tiree_at && (
              <div style={{ marginTop: 10, fontSize: 12, color: MUTED }}>Tirée depuis {timeAgo(draft.declaration_tiree_at)}</div>
            )}
            {draft.declaration_statut2 && (
              <div style={{ marginTop: 14 }}>
                <input style={inputStyle} placeholder="Numéro déclaration + date" value={draft.numero_declaration || ""} onChange={(e) => set({ numero_declaration: e.target.value })} />
              </div>
            )}
          </ModuleCard>
        </React.Fragment>
      )}

      {tab === "paiement" && (
        <ModuleCard Icon={IconWallet} title="Paiement">
          <div style={{ marginBottom: 16 }}>
            <Toggle on={draft.paiement_simple === false} onChange={(v) => set({ paiement_simple: !v })} label="Mode détails (montants)" />
          </div>

          {draft.paiement_simple !== false ? (
            <Field label="Statut">
              <div style={{ display: "flex", gap: 8 }}>
                <div onClick={() => set({ paye: draft.paye === true ? null : true })} style={{
                  flex: 1, textAlign: "center", padding: "12px", borderRadius: 10, cursor: "pointer", fontWeight: 700, fontSize: 13.5,
                  border: "1px solid " + (draft.paye === true ? GREEN : "rgba(255,255,255,0.12)"),
                  background: draft.paye === true ? "rgba(63,201,138,0.15)" : "rgba(255,255,255,0.03)",
                  color: draft.paye === true ? GREEN : MUTED,
                }}><IconCheck size={14} color={draft.paye === true ? GREEN : MUTED} style={{ marginRight: 6, display: "inline-block", verticalAlign: -2 }} />Payé</div>
                <div onClick={() => set({ paye: draft.paye === false ? null : false })} style={{
                  flex: 1, textAlign: "center", padding: "12px", borderRadius: 10, cursor: "pointer", fontWeight: 700, fontSize: 13.5,
                  border: "1px solid " + (draft.paye === false ? RED : "rgba(255,255,255,0.12)"),
                  background: draft.paye === false ? "rgba(229,72,77,0.15)" : "rgba(255,255,255,0.03)",
                  color: draft.paye === false ? "#FF8A8D" : MUTED,
                }}><IconX size={14} color={draft.paye === false ? "#FF8A8D" : MUTED} style={{ marginRight: 6, display: "inline-block", verticalAlign: -2 }} />Non payé</div>
              </div>
            </Field>
          ) : (
            <React.Fragment>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                <Field label="Montant attendu">
                  <input style={inputStyle} type="number" value={draft.montant_total} onChange={(e) => set({ montant_total: parseFloat(e.target.value) || 0 })} />
                </Field>
                <Field label="Montant payé">
                  <input style={inputStyle} type="number" value={draft.montant_paye} onChange={(e) => set({ montant_paye: parseFloat(e.target.value) || 0 })} />
                </Field>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 14px", background: reste > 0 ? "rgba(229,72,77,0.08)" : "rgba(63,201,138,0.08)", border: "1px solid " + (reste > 0 ? "rgba(229,72,77,0.25)" : "rgba(63,201,138,0.25)"), borderRadius: 10, marginBottom: 16 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: reste > 0 ? "#FF8A8D" : GREEN }}>Reste dû</span>
                <span style={{ fontSize: 16, fontWeight: 700, color: reste > 0 ? "#FF8A8D" : GREEN }}>{fmtFCFA(reste)}</span>
              </div>
            </React.Fragment>
          )}

          <Field label="Payé chez">
            <div style={{ display: "flex", gap: 8 }}>
              {PAYE_CHEZ_DEFAUT.map((p) => (
                <div key={p} style={selectChipStyle(draft.paye_chez === p)} onClick={() => set({ paye_chez: draft.paye_chez === p ? null : p })}>{p}</div>
              ))}
            </div>
          </Field>
        </ModuleCard>
      )}

      {dirty && (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, padding: "14px 16px", background: INK, borderTop: "1px solid rgba(255,255,255,0.08)", zIndex: 20 }}>
          <div style={{ maxWidth: 760, margin: "0 auto", display: "flex", gap: 10 }}>
            <button onClick={handleAnnuler} style={{ padding: "13px 20px", borderRadius: 11, border: "1px solid rgba(255,255,255,0.12)", background: "transparent", color: MUTED, fontWeight: 600, cursor: "pointer" }}>Annuler</button>
            <button onClick={handleValider} disabled={saving} style={{
              flex: 1, padding: "13px", borderRadius: 11, border: "none", background: GOLD, color: INK,
              fontSize: 14.5, fontWeight: 700, cursor: saving ? "not-allowed" : "pointer", display: "flex",
              alignItems: "center", justifyContent: "center", gap: 8, opacity: saving ? 0.7 : 1,
            }}>
              {saving && <IconLoader size={16} color={INK} style={{ animation: "spin 1s linear infinite" }} />}
              {saving ? "Enregistrement…" : "Valider les modifications"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- Dashboard ---------- */
function Dashboard({ dossiers, onOpen, onNew, onEditStart }) {
  const [filterOp, setFilterOp] = useState("Tous");
  const [filterNiveau, setFilterNiveau] = useState("Tous");
  const [filterSousEtape, setFilterSousEtape] = useState("Tous");
  const [filterUrgency, setFilterUrgency] = useState("Tous");
  const [filterPaiement, setFilterPaiement] = useState("Tous"); // Tous | Paye | NonPaye
  const [alertesActives, setAlertesActives] = useState(true);
  const [showFiltres, setShowFiltres] = useState(false);
  const [search, setSearch] = useState("");

  const withUrgency = dossiers.map((d) => ({ ...d, _urgency: alertesActives ? urgencyOf(d) : null }));
  const red = dossiers.filter((d) => urgencyOf(d) === "red").length;
  const yellow = dossiers.filter((d) => urgencyOf(d) === "yellow").length;

  const estPaye = (d) => (d.paiement_simple === false ? (d.montant_total || 0) - (d.montant_paye || 0) <= 0 : !!d.paye);

  // Sous-étapes disponibles pour le niveau sélectionné (pour affiner le filtre)
  const sousEtapesDisponibles = filterNiveau === "AVD" ? AVD_STATUTS
    : filterNiveau === "Exoneration" ? EXO_STATUTS
    : filterNiveau === "Declaration" ? DECL_STATUTS2
    : filterNiveau === "Nouveau" ? NOUVEAU_DOSSIER_STATUTS
    : [];

  const filtered = withUrgency
    .filter((d) => filterOp === "Tous" || d.type_op === filterOp)
    .filter((d) => filterNiveau === "Tous" || niveauAffiche(d).niveau === filterNiveau)
    .filter((d) => filterSousEtape === "Tous" || niveauAffiche(d).sousEtape === filterSousEtape)
    .filter((d) => filterUrgency === "Tous" || d._urgency === filterUrgency)
    .filter((d) => filterPaiement === "Tous" || (filterPaiement === "Paye" ? estPaye(d) : !estPaye(d)))
    .filter((d) => !search || d.repertoire.toLowerCase().includes(search.toLowerCase()) || (d.client_nom || "").toLowerCase().includes(search.toLowerCase()) || (d.type_marchandise || "").toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => b.sequence_number - a.sequence_number);

  const filtresActifs = [filterOp !== "Tous", filterUrgency !== "Tous", filterPaiement !== "Tous"].filter(Boolean).length;

  return (
    <div style={{ maxWidth: 980, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 22, flexWrap: "wrap", gap: 14 }}>
        <div>
          <div style={{ fontSize: 11, color: GOLD, textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 700, marginBottom: 4 }}>Bureau de Transit</div>
          <h1 style={{ fontSize: 26, fontWeight: 700, color: PAPER, margin: 0 }}>Suivi des dossiers</h1>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={onEditStart} title="Modifier le format du répertoire" style={{
            display: "flex", alignItems: "center", gap: 8, padding: "11px 14px", borderRadius: 11,
            border: "1px solid rgba(255,255,255,0.12)", background: "transparent", color: MUTED, cursor: "pointer",
          }}><IconSettings size={16} color={MUTED} /></button>
          <button onClick={onNew} style={{
            display: "flex", alignItems: "center", gap: 8, padding: "11px 18px", borderRadius: 11,
            border: "none", background: GOLD, color: INK, fontSize: 14, fontWeight: 700, cursor: "pointer",
          }}><IconPlus size={17} color={INK} /> Nouveau dossier</button>
        </div>
      </div>

      <div style={{ display: "flex", gap: 12, marginBottom: 22, flexWrap: "wrap" }}>
        <StatPill label="Dossiers actifs" value={dossiers.length} tone="gold" />
        <StatPill label="Alertes rouges" value={red} tone="red" />
        <StatPill label="En surveillance" value={yellow} tone="amber" />
      </div>

      <div style={{ position: "relative", flex: "1 1 220px", marginBottom: 14 }}>
        <IconSearch size={15} color={MUTED} style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)" }} />
        <input placeholder="Rechercher un répertoire, un client…" value={search} onChange={(e) => setSearch(e.target.value)} style={{ ...inputStyle, paddingLeft: 36 }} />
      </div>

      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
        {["Tous", ...NIVEAUX].map((n) => (
          <div key={n} onClick={() => { setFilterNiveau(n); setFilterSousEtape("Tous"); }} style={selectChipStyle(filterNiveau === n)}>{n === "Tous" ? "Tous les niveaux" : NIVEAU_LABEL[n]}</div>
        ))}
      </div>

      {sousEtapesDisponibles.length > 0 && (
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14, paddingLeft: 8, borderLeft: "2px solid rgba(196,149,42,0.3)" }}>
          {["Tous", ...sousEtapesDisponibles].map((s) => (
            <div key={s} onClick={() => setFilterSousEtape(s)} style={{ ...selectChipStyle(filterSousEtape === s), fontSize: 12 }}>{s}</div>
          ))}
        </div>
      )}

      <div style={{ marginBottom: 18 }}>
        <button onClick={() => setShowFiltres(!showFiltres)} style={{
          display: "flex", alignItems: "center", gap: 8, background: "none", border: "1px solid rgba(255,255,255,0.1)",
          borderRadius: 10, padding: "9px 14px", color: MUTED, fontSize: 13, fontWeight: 600, cursor: "pointer",
        }}>
          <IconFilter size={14} color={MUTED} />
          Filtres avancés{filtresActifs > 0 ? " (" + filtresActifs + ")" : ""}
          <IconChevronRight size={14} color={MUTED} style={{ transform: showFiltres ? "rotate(90deg)" : "none", transition: "transform .15s" }} />
        </button>

        {showFiltres && (
          <div style={{ marginTop: 12, padding: 16, background: INK_2, border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, display: "flex", flexDirection: "column", gap: 14 }}>
            <div>
              <div style={{ fontSize: 11, color: MUTED, textTransform: "uppercase", marginBottom: 8 }}>Type d'opération</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {["Tous", ...TYPES_OP].map((t) => <div key={t} onClick={() => setFilterOp(t)} style={selectChipStyle(filterOp === t)}>{t}</div>)}
              </div>
            </div>

            <div>
              <div style={{ fontSize: 11, color: MUTED, textTransform: "uppercase", marginBottom: 8 }}>Paiement</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                <div onClick={() => setFilterPaiement("Tous")} style={selectChipStyle(filterPaiement === "Tous")}>Tous</div>
                <div onClick={() => setFilterPaiement("Paye")} style={{
                  ...selectChipStyle(filterPaiement === "Paye"),
                  borderColor: filterPaiement === "Paye" ? GREEN : "rgba(255,255,255,0.12)",
                  color: filterPaiement === "Paye" ? GREEN : MUTED,
                  background: filterPaiement === "Paye" ? "rgba(63,201,138,0.14)" : "rgba(255,255,255,0.03)",
                }}><IconCheck size={12} color={filterPaiement === "Paye" ? GREEN : MUTED} style={{ marginRight: 5, display: "inline-block", verticalAlign: -1 }} />Payé</div>
                <div onClick={() => setFilterPaiement("NonPaye")} style={{
                  ...selectChipStyle(filterPaiement === "NonPaye"),
                  borderColor: filterPaiement === "NonPaye" ? RED : "rgba(255,255,255,0.12)",
                  color: filterPaiement === "NonPaye" ? "#FF8A8D" : MUTED,
                  background: filterPaiement === "NonPaye" ? "rgba(229,72,77,0.14)" : "rgba(255,255,255,0.03)",
                }}><IconX size={12} color={filterPaiement === "NonPaye" ? "#FF8A8D" : MUTED} style={{ marginRight: 5, display: "inline-block", verticalAlign: -1 }} />Non payé</div>
              </div>
            </div>

            <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <div style={{ fontSize: 11, color: MUTED, textTransform: "uppercase" }}>Alertes</div>
                <Toggle on={alertesActives} onChange={setAlertesActives} />
              </div>
              {alertesActives && (
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  <div onClick={() => setFilterUrgency(filterUrgency === "red" ? "Tous" : "red")} style={{
                    ...selectChipStyle(filterUrgency === "red"),
                    borderColor: filterUrgency === "red" ? RED : "rgba(255,255,255,0.12)",
                    color: filterUrgency === "red" ? "#FF8A8D" : MUTED,
                    background: filterUrgency === "red" ? "rgba(229,72,77,0.14)" : "rgba(255,255,255,0.03)",
                  }}><IconAlertTriangle size={13} color={filterUrgency === "red" ? "#FF8A8D" : MUTED} style={{ marginRight: 5, display: "inline-block", verticalAlign: -2 }} />Rouge</div>
                  <div onClick={() => setFilterUrgency(filterUrgency === "yellow" ? "Tous" : "yellow")} style={{
                    ...selectChipStyle(filterUrgency === "yellow"),
                    borderColor: filterUrgency === "yellow" ? AMBER : "rgba(255,255,255,0.12)",
                    color: filterUrgency === "yellow" ? AMBER : MUTED,
                    background: filterUrgency === "yellow" ? "rgba(245,185,61,0.14)" : "rgba(255,255,255,0.03)",
                  }}><IconClock size={13} color={filterUrgency === "yellow" ? AMBER : MUTED} style={{ marginRight: 5, display: "inline-block", verticalAlign: -2 }} />Jaune</div>
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      {filtered.length === 0 ? (
        <div style={{ textAlign: "center", padding: "60px 20px", color: MUTED }}>
          <IconPackage size={32} color={MUTED} style={{ marginBottom: 12 }} />
          <div style={{ fontSize: 14 }}>{dossiers.length === 0 ? "Aucun dossier pour le moment. Créez le premier." : "Aucun dossier ne correspond à ces critères."}</div>
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 14 }}>
          {filtered.map((d) => <DossierCard key={d.id} d={d} onOpen={onOpen} />)}
        </div>
      )}
    </div>
  );
}

/* ---------- Modal correction point de départ (accessible même après création de dossiers) ---------- */
function EditStartSequenceModal({ currentStart, currentPrefixe, currentSuffixe, currentLargeur, hasDossiers, onClose, onSaved }) {
  const [prefixe, setPrefixe] = useState(currentPrefixe || "OK26");
  const [suffixe, setSuffixe] = useState(currentSuffixe || "SS");
  const [value, setValue] = useState(currentLargeur ? String(currentStart || "").padStart(currentLargeur, "0") : String(currentStart || ""));
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  const n = parseInt(value, 10);
  const largeur = value.trim().length;
  const valid = value.trim() !== "" && /^\d+$/.test(value.trim()) && n > 0;
  const apercu = valid ? prefixe + String(n).padStart(largeur, "0") + suffixe : "";

  const handleSave = async () => {
    if (!valid) return;
    setSaving(true);
    setError(null);
    try {
      await forceStartSequenceRemote(n, prefixe, suffixe, largeur);
      onSaved({ start: n, prefixe, suffixe, largeur });
    } catch (e) {
      setError("Impossible de mettre à jour : " + (e.message || "erreur inconnue"));
      setSaving(false);
    }
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={onClose}>
      <div style={{ background: INK_2, border: "1px solid rgba(255,255,255,0.1)", borderRadius: 16, padding: 24, maxWidth: 420, width: "100%" }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: PAPER }}>Modifier le format du répertoire</div>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", display: "flex" }}><IconX size={18} color={MUTED} /></button>
        </div>

        {hasDossiers && (
          <div style={{ fontSize: 12.5, color: AMBER, background: "rgba(245,185,61,0.1)", border: "1px solid rgba(245,185,61,0.3)", borderRadius: 10, padding: 12, marginBottom: 16, lineHeight: 1.5 }}>
            Des dossiers existent déjà. Cette modification ne renumérote pas les dossiers existants — elle ne change que le format des prochains numéros.
          </div>
        )}

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <Field label="Préfixe">
            <input style={inputStyle} value={prefixe} onChange={(e) => setPrefixe(e.target.value)} />
          </Field>
          <Field label="Suffixe">
            <input style={inputStyle} value={suffixe} onChange={(e) => setSuffixe(e.target.value)} />
          </Field>
        </div>

        <Field label="Nombre de départ">
          <input style={inputStyle} value={value} onChange={(e) => setValue(e.target.value.replace(/[^0-9]/g, ""))} />
        </Field>

        {valid && (
          <div style={{ fontSize: 12.5, color: GOLD, marginBottom: 14, fontFamily: "ui-monospace, monospace" }}>
            Prochain numéro potentiel : {apercu}
          </div>
        )}

        {error && <div style={{ fontSize: 12.5, color: "#FF8A8D", marginBottom: 10 }}>{error}</div>}

        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onClose} style={{ flex: 1, padding: "12px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.12)", background: "transparent", color: MUTED, fontWeight: 600, cursor: "pointer" }}>Annuler</button>
          <button onClick={handleSave} disabled={!valid || saving} style={{
            flex: 1, padding: "12px", borderRadius: 10, border: "none", background: GOLD, color: INK, fontWeight: 700,
            cursor: valid && !saving ? "pointer" : "not-allowed", opacity: valid && !saving ? 1 : 0.5,
            display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
          }}>
            {saving && <IconLoader size={14} color={INK} style={{ animation: "spin 1s linear infinite" }} />}
            {saving ? "Enregistrement…" : "Enregistrer"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---------- App racine ---------- */
function App() {
  const [dossiers, setDossiers] = useState([]);
  const [startSequence, setStartSequence] = useState(undefined);
  const [repFormat, setRepFormat] = useState(null); // {prefixe, suffixe, largeur}
  const [view, setView] = useState("dashboard");
  const [activeId, setActiveId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [connError, setConnError] = useState(null); // null = pas d'erreur, sinon message détaillé
  const [showEditStart, setShowEditStart] = useState(false);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const [start, fmt, res] = await Promise.all([
          fetchStartSequence(),
          fetchRepertoireFormat(),
          supabase.from("dossiers").select("*").order("sequence_number", { ascending: false }),
        ]);
        if (res.error) throw res.error;
        if (cancelled) return;
        setStartSequence(start);
        setRepFormat(fmt);
        setDossiers(res.data || []);
      } catch (e) {
        if (!cancelled) setConnError(e.message || "Erreur de connexion inconnue à Supabase.");
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    const channel = supabase
      .channel("dossiers-realtime")
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "dossiers" }, (payload) => {
        setDossiers((prev) => (prev.some((d) => d.id === payload.new.id) ? prev : [payload.new, ...prev]));
      })
      .on("postgres_changes", { event: "UPDATE", schema: "public", table: "dossiers" }, (payload) => {
        setDossiers((prev) => prev.map((d) => (d.id === payload.new.id ? payload.new : d)));
      })
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, []);

  const openDossier = (d) => { setActiveId(d.id); setView("detail"); };
  const createDossier = (d) => {
    setDossiers((prev) => (prev.some((x) => x.id === d.id) ? prev : [d, ...prev]));
    setActiveId(d.id);
    setView("detail");
  };
  const updateDossier = (updated) => setDossiers((prev) => prev.map((d) => (d.id === updated.id ? updated : d)));
  const activeDossier = dossiers.find((d) => d.id === activeId);

  if (loading) {
    return (
      <div style={{ minHeight: "100vh", background: INK, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <IconLoader size={22} color={GOLD} style={{ animation: "spin 1s linear infinite" }} />
      </div>
    );
  }

  if (connError) {
    return (
      <div style={{ minHeight: "100vh", background: INK, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ maxWidth: 420, textAlign: "center" }}>
          <IconAlertTriangle size={28} color={RED} style={{ marginBottom: 12 }} />
          <div style={{ fontSize: 15, fontWeight: 700, color: PAPER, marginBottom: 8 }}>Connexion à Supabase impossible</div>
          <div style={{ fontSize: 13, color: MUTED, lineHeight: 1.5, marginBottom: 14 }}>
            Vérifiez la connexion internet, que le script SQL a bien été exécuté dans Supabase, et que l'URL / clé API sont correctes.
          </div>
          <div style={{ fontSize: 12, color: "#FF8A8D", background: "rgba(229,72,77,0.08)", border: "1px solid rgba(229,72,77,0.25)", borderRadius: 10, padding: 12, textAlign: "left", wordBreak: "break-word" }}>
            {connError}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: INK, fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" }}>
      <div style={{ borderBottom: "1px solid rgba(255,255,255,0.06)", padding: "16px 24px", position: "sticky", top: 0, background: INK, zIndex: 10 }}>
        <div style={{ maxWidth: 980, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 30, height: 30, borderRadius: 8, background: GOLD, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <IconPackage size={16} color={INK} />
            </div>
            <span style={{ fontSize: 15, fontWeight: 700, color: PAPER }}>Bureau de Transit</span>
          </div>
          <div style={{ fontSize: 12, color: MUTED, display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ width: 7, height: 7, borderRadius: "50%", background: GREEN, display: "inline-block" }} />
            Synchronisé
          </div>
        </div>
      </div>

      <div style={{ padding: "28px 16px 60px" }}>
        {startSequence === null ? (
          <StartSequenceSetup onConfirm={(f) => { setStartSequence(f.start); setRepFormat({ prefixe: f.prefixe, suffixe: f.suffixe, largeur: f.largeur }); }} />
        ) : (
          <React.Fragment>
            {view === "dashboard" && (
              <Dashboard dossiers={dossiers} onOpen={openDossier} onNew={() => setView("new")} onEditStart={() => setShowEditStart(true)} />
            )}
            {view === "new" && <NewDossierForm onCancel={() => setView("dashboard")} onCreate={createDossier} />}
            {view === "detail" && activeDossier && <DossierDetail dossier={activeDossier} onBack={() => setView("dashboard")} onUpdate={updateDossier} />}
          </React.Fragment>
        )}
      </div>

      {showEditStart && (
        <EditStartSequenceModal
          currentStart={startSequence}
          currentPrefixe={repFormat ? repFormat.prefixe : "OK26"}
          currentSuffixe={repFormat ? repFormat.suffixe : "SS"}
          currentLargeur={repFormat ? repFormat.largeur : 0}
          hasDossiers={dossiers.length > 0}
          onClose={() => setShowEditStart(false)}
          onSaved={(f) => { setStartSequence(f.start); setRepFormat({ prefixe: f.prefixe, suffixe: f.suffixe, largeur: f.largeur }); setShowEditStart(false); }}
        />
      )}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
} catch (e) {
  const boot = document.getElementById("boot-error");
  const detail = document.getElementById("boot-error-detail");
  boot.style.display = "block";
  detail.textContent = "Erreur au montage de l'application :\n" + (e.message || e);
}
</script>
</body>
</html>
